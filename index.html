    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16x16.png" />

    <!-- Legacy fallback -->
    <link rel="icon" type="image/png" href="/favicon.png" />

    <!--
      SEO/SOCIAL HEAD — chunk: spa-launch-readiness-seo-2026-05-09 (implementer pass).
        1. Global OG/Twitter meta is shipped in this static index.html so social-card
           crawlers (FB, IG, iMessage, Slack, etc.) get correct values without having
           to execute the React bundle. Per-route OG meta is wired via
           src/app/seo.ts#setRouteMeta() for CSR routes.
        2. Canonical points to https://www.mukyala.com (the www host). Bare-apex
           mukyala.com is expected to 301 to the www host at the CDN/ALB layer.
        3. JSON-LD is injected as a static <script type="application/ld+json"> block
           below so crawlers see it on first paint, even on CSR routes. This is the
           canonical structured-data location; do NOT add a duplicate LD-JSON via
           client-side injection.
    -->

    <!-- Primary Meta Tags -->
    <title>Mukyala — Licensed Esthetician Facials in Carlsbad</title>
    <meta
      name="description"
      content="Carlsbad day spa with licensed esthetician facials, dermaplane, peels, and body rituals. Science-rooted skincare in a calm, inclusive space."
    />
    <link rel="canonical" href="https://www.mukyala.com" />
    <meta name="robots" content="index,follow,max-image-preview:large" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Mukyala" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:url" content="https://www.mukyala.com" />
    <meta property="og:title" content="Mukyala — Licensed Esthetician Facials in Carlsbad" />

    />
    <!--
      og:image is /og-image.jpg — a typographic bridge card produced by
      scripts/generate-og-image.mjs (npm run og:generate).
      TODO(implementer): swap to AI-generated atmospheric photo when delivered
      by operator. Update og:image:width/height if dimensions change.
    -->
    <meta property="og:image" content="https://www.mukyala.com/og-image.jpg" />
    <meta property="og:image:secure_url" content="https://www.mukyala.com/og-image.jpg" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Mukyala — Licensed esthetician facials. Carlsbad." />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Mukyala — Licensed Esthetician Facials in Carlsbad" />
    <meta
      name="twitter:description"
      content="Carlsbad day spa with licensed esthetician facials, dermaplane, peels, and body rituals. Science-rooted skincare in a calm, inclusive space."
    />
    <meta name="twitter:image" content="https://www.mukyala.com/og-image.jpg" />
    <meta name="twitter:image:alt" content="Mukyala — Licensed esthetician facials. Carlsbad." />
